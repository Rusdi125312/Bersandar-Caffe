name: Keep Alive Supabase
on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -X GET "https://zwozrghopacfmdbxokmk.supabase.co/rest/v1/[menu_items]?select=*" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"